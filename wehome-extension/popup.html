<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 270px;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    header {
      background: #fff;
      border-bottom: 3px solid #6800cd;
      padding: 16px 18px 14px;
      color: #1a1a2e;
    }
    .logo {
      display: inline-block;
      background: #6800cd;
      color: #fff;
      font-size: 14px; font-weight: 900;
      padding: 4px 10px; border-radius: 6px;
      letter-spacing: -0.3px; margin-bottom: 8px;
    }
    .tagline { font-size: 11px; color: #888; line-height: 1.5; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
    .points { list-style: none; }
    .points li {
      font-size: 12.5px; color: #333; padding: 4px 0;
      display: flex; align-items: center; gap: 7px;
    }
    .points li::before { content: "✓"; color: #6800cd; font-weight: 700; }
    .btn {
      display: block; text-align: center; text-decoration: none;
      font-size: 13px; font-weight: 700; padding: 11px; border-radius: 10px;
      border: none; cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #6800cd; color: #fff; }
    .btn-chat { background: #f4f0ff; color: #6800cd; }
    .btn-host { background: #fff8e1; color: #4a0093; border: 1.5px solid #e0d0f5; }
    footer {
      font-size: 10px; color: #bbb; text-align: center;
      padding: 0 16px 14px; line-height: 1.5;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">wehome</div>
    <div class="tagline">대한민국 공유숙박 1등<br>Your Home in Korea · #6800cd</div>
  </header>
  <div class="body">
    <ul class="points">
      <li>숙소 페이지에서 위홈 매칭 자동 확인</li>
      <li>결제 페이지에서 7% 절약 금액 표시</li>
      <li>미등록 숙소 → 호스트 초대 메시지</li>
      <li>12개 언어 자동 감지</li>
    </ul>
    <a href="https://wehome.me" target="_blank" class="btn btn-primary">위홈 바로가기</a>
    <a href="https://wehome.me/messages" target="_blank" class="btn btn-chat">💬 1:1 문의하기</a>
    <a href="https://wehome.me/hosting" target="_blank" class="btn btn-host">🏠 위홈 호스트 등록</a>
  </div>
  <footer>Same Home in Better Value than Airbnb<br>wehome.me</footer>
</body>
</html>
