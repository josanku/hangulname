<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 270px;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }
    header {
      background: linear-gradient(135deg, #002966, #003F8C);
      padding: 18px 18px 16px;
      color: #fff;
    }
    .logo {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      line-height: 1.4;
    }
    .body { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
    .desc {
      font-size: 12.5px;
      color: #444;
      line-height: 1.6;
    }
    .points { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .points li {
      font-size: 12px;
      color: #333;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .points li::before {
      content: "✓";
      color: #003580;
      font-weight: 700;
      flex-shrink: 0;
    }
    .btn {
      display: block;
      background: #003580;
      color: #fff;
      text-align: center;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      padding: 11px;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .btn:hover { background: #002560; }
    .btn-chat {
      background: #f4f7ff;
      color: #003580;
      border: 1.5px solid #c8d8f0;
    }
    .btn-chat:hover { background: #e8eef8; }
    footer {
      font-size: 10px;
      color: #bbb;
      text-align: center;
      padding: 0 18px 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">wehome</div>
    <div class="tagline">대한민국 공유숙박 1등<br>Your Home in Korea</div>
  </header>
  <div class="body">
    <p class="desc">에어비앤비 숙소·결제 페이지에서 위홈 배너가 자동으로 표시됩니다.</p>
    <ul class="points">
      <li>숙박료 즉시 7% 할인</li>
      <li>정부 인증 합법 공유숙박</li>
      <li>현지 신속 고객지원</li>
    </ul>
    <a href="https://wehome.me" target="_blank" class="btn">위홈 바로가기</a>
    <a href="https://wehome.me/messages" target="_blank" class="btn btn-chat">💬 1:1 문의하기</a>
  </div>
  <footer>
    Same Home in Better Value than Airbnb<br>
    wehome.me
  </footer>
</body>
</html>
