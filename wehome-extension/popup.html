<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 20px 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      background: #fff;
    }
    .logo {
      display: inline-block;
      background: #FEE500;
      color: #000;
      font-weight: 900;
      font-size: 15px;
      padding: 5px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    p {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 14px;
    }
    a {
      display: block;
      background: #000;
      color: #FEE500;
      text-align: center;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      padding: 11px;
      border-radius: 12px;
    }
    a:hover { opacity: 0.85; }
    .note {
      font-size: 11px;
      color: #bbb;
      text-align: center;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="logo">위홈</div>
  <p>에어비앤비 한국 숙소 페이지에서 위홈 배너가 자동으로 표시됩니다.</p>
  <a href="https://wehome.me" target="_blank">위홈 바로가기</a>
  <p class="note">Same Home in Better Value than Airbnb<br>wehome.me</p>
</body>
</html>
